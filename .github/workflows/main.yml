name: Deploy Application

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v2
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '18'

      - name: Install PM2 Globally
        run: sudo npm install -g pm2
        
      - name: Sync Backend Directory
        run: |
          rsync -av --delete /home/ubuntu/actions-runner-backend/_work/md-ashraful-islam-server/md-ashraful-islam-server/ /home/ubuntu/md-ashraful-islam-server/
     
      - name: Create .env File
        run: |
          echo "DB_USER=Mdashrafulislam" > /home/ubuntu/md-ashraful-islam-server/.env
          echo "DB_PASS=FsIdxs5VQ6rEFcha" >> /home/ubuntu/md-ashraful-islam-server/.env
          cat /home/ubuntu/md-ashraful-islam-server/.env  # Debug: Output .env contents
    
      - name: Install Dependencies
        run: |
          cd /home/ubuntu/md-ashraful-islam-server
          npm install

      - name: Restart Backend with PM2
        run: |
          cd /home/ubuntu/md-ashraful-islam-server
          # Stop any existing PM2 process
          pm2 stop ./index.js || true
          # Start the new process
          pm2 start ./index.js
